name: pr

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v4
      - uses: redhat-actions/buildah-build@v2
        with:
          platforms: linux/amd64,linux/arm64
          image: ghcr.io/${{ github.repository }}
          tags: latest
          containerfiles: |
            ./Containerfile
